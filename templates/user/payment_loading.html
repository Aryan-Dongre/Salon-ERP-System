{% extends "user/base.html" %}

{% block title %}
Processing Payment
{% endblock %}

{% block extra_css %}
<link rel="stylesheet"
      href="{{ url_for('static',
      filename='css/user/payment_loading.css') }}">
{% endblock %}

{% block content %}

<section class="payment-loading-page">

    <div class="loading-card">

        <div class="spinner"></div>

        <h1>
            Processing Payment
        </h1>

        <p>
            Please wait while we securely process
            your payment.
        </p>

        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

</section>

<script>

setTimeout(function() {

    window.location.replace (
        "{{ url_for('user.payment_success', booking_id=payment.booking_id) }}" );

}, 4000);

</script>

{% endblock %}
